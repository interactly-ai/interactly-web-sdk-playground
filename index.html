<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactly AI Web SDK Playground — place live browser voice calls, inspect every SDK event, and test edge cases."
    />
    <meta name="theme-color" content="#1E6EFF" />
    <title>Interactly AI · Web SDK Playground</title>
    <!--
      No-flash theme bootstrap: runs before first paint so the correct theme
      class is applied synchronously and we never flash the wrong background.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("interactly-theme");
          var theme = stored || "system";
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          var isDark = theme === "dark" || (theme === "system" && prefersDark);
          var root = document.documentElement;
          root.classList.toggle("dark", isDark);
          root.style.colorScheme = isDark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
